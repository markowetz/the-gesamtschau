<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datenschutz — The Gesamtschau</title>
  <link rel="canonical" href="https://www.the-gesamtschau.de/privacy.html" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --fg: #e8e8e8;
      --yellow: #ffe600;
      --green: #00ff99;
      --dim: #666;
      --border: #333;
      --mono: "IBM Plex Mono", "Courier New", monospace;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 1.5rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 4rem;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--dim);
    }

    .topbar .site-id {
      color: var(--yellow);
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .topbar .site-id:hover { opacity: 0.7; }

    .lang-bar { display: flex; gap: 0; }

    .lang-bar button {
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--dim);
      padding: 0.2rem 0.6rem;
      transition: background 0.1s, color 0.1s;
    }

    .lang-bar button + button { border-left: none; }

    .lang-bar button.active {
      background: var(--yellow);
      color: #000;
      border-color: var(--yellow);
    }

    .lang-bar button:not(.active):hover {
      color: var(--fg);
      border-color: var(--fg);
    }

    /* Header */
    header {
      padding: 3rem 0 2.5rem;
      border-bottom: 2px solid var(--yellow);
    }

    header h1 {
      font-family: var(--mono);
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      line-height: 1;
      color: var(--yellow);
      letter-spacing: -0.02em;
    }

    /* Blocks */
    .block {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .block-label {
      font-size: 0.7rem;
      color: var(--dim);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .block p {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--fg);
    }

    .block a {
      color: var(--green);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .block a:hover { opacity: 0.7; }

    /* Footer */
    footer {
      padding-top: 2rem;
      display: flex;
      gap: 0.3rem;
      align-items: center;
      font-size: 0.72rem;
      color: var(--dim);
    }

    footer a {
      color: var(--dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--fg); }
    footer .sep { color: var(--border); }

    @media (max-width: 480px) {
      body { padding: 0 1rem; font-size: 13px; }
      header h1 { font-size: clamp(1.8rem, 10vw, 2.8rem); }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Top bar -->
    <div class="topbar">
      <a class="site-id" href="index.html">THE-GESAMTSCHAU.DE</a>
      <div class="lang-bar">
        <button id="btn-de" onclick="setLang('de')">DE</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
        <button id="btn-es" onclick="setLang('es')">ES</button>
        <button id="btn-pt" onclick="setLang('pt')">PT</button>
        <button id="btn-fr" onclick="setLang('fr')">FR</button>
        <button id="btn-ru" onclick="setLang('ru')">RU</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <h1>
        <span data-de="Datenschutz"
              data-en="Privacy Policy"
              data-es="Política de privacidad"
              data-pt="Política de privacidade"
              data-fr="Politique de confidentialité"
              data-ru="Политика конфиденциальности"></span>
      </h1>
    </header>

    <!-- Controller -->
    <div class="block">
      <p class="block-label"
         data-de="Verantwortlicher"
         data-en="Controller"
         data-es="Responsable"
         data-pt="Responsável"
         data-fr="Responsable du traitement"
         data-ru="Ответственный"></p>

         Ippendorfer Allee 31, 53127 Bonn</p>
      <p><a href="mailto:kontakt@markowetz.de">kontakt@markowetz.de</a></p>
    </div>

    <!-- Hosting -->
    <div class="block">
      <p class="block-label">Hosting</p>
      <p>
        <span data-de="Diese Website wird über GitHub Pages (GitHub, Inc., San Francisco, USA) gehostet. Beim Abruf werden durch GitHub technische Zugriffsdaten verarbeitet (IP-Adresse, Zeitpunkt, Browser). Weitere Informationen: "
              data-en="This website is hosted via GitHub Pages (GitHub, Inc., San Francisco, USA). GitHub processes technical access data (IP address, timestamp, browser) upon each request. See: "
              data-es="Este sitio está alojado en GitHub Pages (GitHub, Inc., San Francisco, EE. UU.). GitHub procesa datos de acceso técnicos (dirección IP, marca de tiempo, navegador) en cada solicitud. Más información: "
              data-pt="Este website está alojado no GitHub Pages (GitHub, Inc., San Francisco, EUA). O GitHub processa dados de acesso técnicos (endereço IP, data/hora, navegador) em cada pedido. Mais informações: "
              data-fr="Ce site est hébergé via GitHub Pages (GitHub, Inc., San Francisco, États-Unis). GitHub traite des données d'accès techniques (adresse IP, horodatage, navigateur) à chaque requête. Plus d'informations: "
              data-ru="Этот сайт размещён на GitHub Pages (GitHub, Inc., Сан-Франциско, США). GitHub обрабатывает технические данные доступа (IP-адрес, временная метка, браузер) при каждом запросе. Подробнее: "></span><a href="https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement" target="_blank" rel="noopener">GitHub Privacy Statement</a>.
      </p>
    </div>

    <!-- Data collection -->
    <div class="block">
      <p class="block-label"
         data-de="Datenerfassung"
         data-en="Data Collection"
         data-es="Recopilación de datos"
         data-pt="Recolha de dados"
         data-fr="Collecte de données"
         data-ru="Сбор данных"></p>
      <p data-de="Diese Website verwendet keine eigenen Cookies, kein Tracking und keine Analyse-Dienste. Es werden keine personenbezogenen Daten durch den Betreiber erhoben oder gespeichert."
         data-en="This website uses no cookies, no tracking, and no analytics. No personal data is collected or stored by the operator."
         data-es="Este sitio no utiliza cookies propias, ni seguimiento ni servicios de análisis. El operador no recopila ni almacena datos personales."
         data-pt="Este website não utiliza cookies próprios, rastreamento nem serviços de análise. Nenhum dado pessoal é recolhido ou armazenado pelo operador."
         data-fr="Ce site n'utilise pas de cookies, pas de suivi et pas de services d'analyse. Aucune donnée personnelle n'est collectée ou stockée par l'opérateur."
         data-ru="Этот сайт не использует файлы cookie, отслеживание или аналитические службы. Оператор не собирает и не хранит персональные данные."></p>
    </div>

    <!-- External services -->
    <div class="block">
      <p class="block-label"
         data-de="Externe Dienste"
         data-en="External Services"
         data-es="Servicios externos"
         data-pt="Serviços externos"
         data-fr="Services externes"
         data-ru="Внешние сервисы"></p>
      <p data-de="Die Seite verlinkt auf externe Plattformen (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Links müssen aktiv angeklickt werden — es findet keine automatische Datenübertragung statt."
         data-en="This site links to external platforms (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Links must be actively clicked — no automatic data transfer occurs. Their respective privacy policies apply."
         data-es="Este sitio enlaza con plataformas externas (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Los enlaces deben hacerse clic activamente — no se produce transferencia automática de datos. Se aplican sus respectivas políticas de privacidad."
         data-pt="Este site liga-se a plataformas externas (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Os links devem ser clicados ativamente — não ocorre transferência automática de dados. Aplicam-se as respetivas políticas de privacidade."
         data-fr="Ce site renvoie vers des plateformes externes (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Les liens doivent être cliqués activement — aucun transfert automatique de données n'a lieu. Leurs politiques de confidentialité respectives s'appliquent."
         data-ru="Сайт содержит ссылки на внешние платформы (Spotify, Apple Podcasts, LinkedIn, Facebook, Redbubble). Ссылки требуют активного нажатия — автоматической передачи данных не происходит. Применяются соответствующие политики конфиденциальности."></p>
    </div>

    <!-- Rights -->
    <div class="block">
      <p class="block-label"
         data-de="Ihre Rechte"
         data-en="Your Rights"
         data-es="Sus derechos"
         data-pt="Os seus direitos"
         data-fr="Vos droits"
         data-ru="Ваши права"></p>
      <p>
        <span data-de="Nach DSGVO haben Sie das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit und Widerspruch. Anfragen: "
              data-en="Under GDPR you have the right to access, rectification, erasure, restriction, portability, and objection. Requests: "
              data-es="Según el RGPD, tiene derecho de acceso, rectificación, supresión, limitación, portabilidad y oposición. Solicitudes: "
              data-pt="Ao abrigo do RGPD, tem o direito de acesso, retificação, apagamento, limitação, portabilidade e oposição. Pedidos: "
              data-fr="En vertu du RGPD, vous disposez du droit d'accès, de rectification, d'effacement, de limitation, de portabilité et d'opposition. Demandes: "
              data-ru="В соответствии с GDPR вы имеете право на доступ, исправление, удаление, ограничение, переносимость и возражение. Запросы: "></span><a href="mailto:kontakt@markowetz.de">kontakt@markowetz.de</a>.
      </p>
    </div>

    <!-- Footer -->
    <footer>
      <a href="index.html">The Gesamtschau</a>
      <span class="sep"> · </span>
      <a href="impressum.html"
         data-de="Impressum"
         data-en="Imprint"
         data-es="Aviso legal"
         data-pt="Aviso legal"
         data-fr="Mentions légales"
         data-ru="Выходные данные">Impressum</a>
    </footer>

  </div>

  <script>
    const LANGS = ['de', 'en', 'es', 'pt', 'fr', 'ru'];

    function setLang(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll(LANGS.map(l => '[data-' + l + ']').join(',')).forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text !== null) el.textContent = text;
      });
      LANGS.forEach(l => {
        document.getElementById('btn-' + l).classList.toggle('active', l === lang);
      });
      localStorage.setItem('gs-lang', lang);
    }

    const saved = localStorage.getItem('gs-lang') || 'de';
    setLang(saved);
  </script>
</body>
</html>
