  <script>
    const LANGS = ['de', 'en', 'es', 'pt', 'fr', 'ru'];
    let blogPosts = [];
    let currentLang = 'de';

    function renderLatestPost(lang) {
      if (!blogPosts.length) return;
      const post = blogPosts[0];
      const t = post.translations[lang] || post.translations['de'];
      document.getElementById('blog-latest-date').textContent = post.date;
      document.getElementById('blog-latest-title').textContent = t.title;
      const bodyEl = document.getElementById('blog-latest-body');
      bodyEl.innerHTML = '';
      t.body.split(/\n\n+/).forEach(para => {
        if (para.trim()) {
          const p = document.createElement('p');
          p.className = 'body-text';
          p.textContent = para.trim();
          bodyEl.appendChild(p);
        }
      });
    }

    async function loadBlog() {
      try {
        const res = await fetch('posts.json', { cache: 'no-store' });
        blogPosts = await res.json();
        renderLatestPost(currentLang);
      } catch(e) { /* no posts yet */ }
    }

    const SPOTIFY_URLS = {
      de: 'https://open.spotify.com/show/4psTvnCyofQGobrBVnlsoS',
      en: 'https://open.spotify.com/show/4b75h5NA9hf4TkVD1nj70S',
      es: 'https://open.spotify.com/show/2Ld6ZnOmLsIrnY3eUAX757',
      pt: 'https://open.spotify.com/show/72m5pBQjseOVmjwMUlTs3P',
      fr: 'https://open.spotify.com/show/08iF6zm2lNQNyYCgpstNtB',
      ru: 'https://open.spotify.com/show/7A8h2FdB2EFjpqbUhOr96q',
    };

    const APPLE_URLS = {
      de: 'https://podcasts.apple.com/de/podcast/the-gesamtschau-deutsch/id1804452911',
      en: 'https://podcasts.apple.com/us/podcast/the-gesamtschau-english/id1885224600',
      es: 'https://podcasts.apple.com/de/podcast/the-gesamtschau-espa%C3%B1ol/id1885224669',
      pt: 'https://podcasts.apple.com/us/podcast/the-gesamtschau-portugu%C3%AAs/id1885224413',
      fr: 'https://podcasts.apple.com/us/podcast/the-gesamtschau-fran%C3%A7ais/id1885224769',
      ru: 'https://podcasts.apple.com/de/podcast/the-gesamtschau-%D1%80%D1%83%D1%81%D1%81%D0%BA%D0%B8%D0%B9/id1885224677',
    };

    const RSS_FEEDS = {
      de: 'https://feeds.transistor.fm/the-gesamtschau',
      en: 'https://feeds.transistor.fm/the-gesamtschau-english',
      es: 'https://feeds.transistor.fm/the-gesamtschau-espanol',
      pt: 'https://feeds.transistor.fm/the-gesamtschau-portugues',
      fr: 'https://feeds.transistor.fm/the-gesamtschau-francais',
      ru: 'https://feeds.transistor.fm/the-gesamtschau-russian',
    };

    function updatePodcastPlayer(lang) {
      const player = document.getElementById('podcast-player');
      if (!player) return;
      const epId = player.getAttribute('data-episode-' + lang);
      if (epId) {
        player.innerHTML = '<iframe src="https://share.transistor.fm/e/' + epId + '" width="100%" height="180" frameborder="0" scrolling="no" seamless="true" loading="lazy"></iframe>';
      } else {
        player.innerHTML = '';
      }
    }

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      document.querySelectorAll(LANGS.map(l => '[data-' + l + ']').join(',')).forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text !== null) el.textContent = text;
      });
      updatePodcastPlayer(lang);
      const rssLink = document.getElementById('rss-link');
      if (rssLink) rssLink.href = RSS_FEEDS[lang];
      const spotifyLink = document.getElementById('spotify-link');
      if (spotifyLink) spotifyLink.href = SPOTIFY_URLS[lang];
      const appleLink = document.getElementById('apple-link');
      if (appleLink) appleLink.href = APPLE_URLS[lang];
      LANGS.forEach(l => {
        document.getElementById('btn-' + l).classList.toggle('active', l === lang);
      });
      renderLatestPost(lang);
      localStorage.setItem('gs-lang', lang);
    }

    const saved = localStorage.getItem('gs-lang') || 'de';
    setLang(saved);
    loadBlog();
  </script>
