name: Update Podcast Episodes

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Fetch latest episode IDs
        env:
          TRANSISTOR_API_KEY: ${{ secrets.TRANSISTOR_API_KEY }}
        run: python3 update_episodes.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes." || (
            git add index.html &&
            git commit -m "Update podcast episode IDs [skip ci]" &&
            git push
          )
