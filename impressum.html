<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Impressum — The Gesamtschau</title>
  <link rel="canonical" href="https://www.the-gesamtschau.de/impressum.html" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --fg: #e8e8e8;
      --yellow: #ffe600;
      --green: #00ff99;
      --dim: #666;
      --border: #333;
      --mono: "IBM Plex Mono", "Courier New", monospace;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 1.5rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 4rem;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--dim);
    }

    .topbar .site-id {
      color: var(--yellow);
      letter-spacing: 0.1em;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .topbar .site-id:hover { opacity: 0.7; }

    .lang-bar { display: flex; gap: 0; }

    .lang-bar button {
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--dim);
      padding: 0.2rem 0.6rem;
      transition: background 0.1s, color 0.1s;
    }

    .lang-bar button + button { border-left: none; }

    .lang-bar button.active {
      background: var(--yellow);
      color: #000;
      border-color: var(--yellow);
    }

    .lang-bar button:not(.active):hover {
      color: var(--fg);
      border-color: var(--fg);
    }

    /* Header */
    header {
      padding: 3rem 0 2.5rem;
      border-bottom: 2px solid var(--yellow);
    }

    header h1 {
      font-family: var(--mono);
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      line-height: 1;
      color: var(--yellow);
      letter-spacing: -0.02em;
    }

    /* Sections */
    .block {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .block-label {
      font-size: 0.7rem;
      color: var(--dim);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .block p {
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--fg);
    }

    .block a {
      font-size: 0.9rem;
      color: var(--green);
      text-decoration: none;
      transition: opacity 0.15s;
      margin-top: 0.2rem;
    }

    .block a:hover { opacity: 0.7; }

    .divider {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1rem 0 0;
    }

    /* Footer */
    footer {
      padding-top: 2rem;
      display: flex;
      gap: 0.3rem;
      align-items: center;
      font-size: 0.72rem;
      color: var(--dim);
    }

    footer a {
      color: var(--dim);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--fg); }
    footer .sep { color: var(--border); }

    @media (max-width: 480px) {
      body { padding: 0 1rem; font-size: 13px; }
      header h1 { font-size: clamp(1.8rem, 10vw, 2.8rem); }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Top bar -->
    <div class="topbar">
      <a class="site-id" href="index.html">THE-GESAMTSCHAU.DE</a>
      <div class="lang-bar">
        <button id="btn-de" onclick="setLang('de')">DE</button>
        <button id="btn-en" onclick="setLang('en')">EN</button>
        <button id="btn-es" onclick="setLang('es')">ES</button>
        <button id="btn-pt" onclick="setLang('pt')">PT</button>
        <button id="btn-fr" onclick="setLang('fr')">FR</button>
        <button id="btn-ru" onclick="setLang('ru')">RU</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <h1>
        <span data-de="Impressum"
              data-en="Imprint"
              data-es="Aviso legal"
              data-pt="Aviso legal"
              data-fr="Mentions légales"
              data-ru="Выходные данные"></span>
      </h1>
    </header>

    <!-- Company -->
    <div class="block">
      <p>The Gesamtschau Institute UG (haftungsbeschränkt)</p>
      <p>Ippendorfer Allee 31</p>
      <p>53127 Bonn</p>
      <a href="mailto:kontakt@markowetz.de">kontakt@markowetz.de</a>
    </div>

    <!-- Registration -->
    <div class="block">
      <p class="block-label"
         data-de="Registrierung"
         data-en="Registration"
         data-es="Registro"
         data-pt="Registo"
         data-fr="Enregistrement"
         data-ru="Регистрация"></p>
      <p>
        <span data-de="Registergericht: AG Bonn"
              data-en="Registration Court: AG Bonn"
              data-es="Tribunal de registro: AG Bonn"
              data-pt="Tribunal de registo: AG Bonn"
              data-fr="Tribunal d'enregistrement: AG Bonn"
              data-ru="Регистрационный суд: AG Bonn"></span>
      </p>
      <p>
        <span data-de="Registernummer: HRB23234"
              data-en="Registration Number: HRB23234"
              data-es="Número de registro: HRB23234"
              data-pt="Número de registo: HRB23234"
              data-fr="Numéro d'enregistrement: HRB23234"
              data-ru="Регистрационный номер: HRB23234"></span>
      </p>
      <p>
        <span data-de="Umsatzsteuer-Identifikationsnummer: DE318430297"
              data-en="VAT Identification Number: DE318430297"
              data-es="Número de identificación fiscal: DE318430297"
              data-pt="Número de identificação fiscal: DE318430297"
              data-fr="Numéro d'identification TVA: DE318430297"
              data-ru="Идентификационный номер плательщика НДС: DE318430297"></span>
      </p>
    </div>

    <!-- Director -->
    <div class="block">
      <p class="block-label"
         data-de="Geschäftsführer &amp; Verantwortlicher für journalistisch-redaktionelle Inhalte"
         data-en="Executive Director &amp; Responsible for Journalistic-Editorial Contents"
         data-es="Director ejecutivo &amp; Responsable de los contenidos periodístico-editoriales"
         data-pt="Diretor executivo &amp; Responsável pelos conteúdos jornalístico-editoriais"
         data-fr="Directeur général &amp; Responsable des contenus journalistiques et éditoriaux"
         data-ru="Генеральный директор &amp; Ответственный за журналистско-редакционный контент"></p>
      <p>Alexander Markowetz</p>
      <a href="mailto:kontakt@markowetz.de">kontakt@markowetz.de</a>
    </div>

    <!-- Footer -->
    <footer>
      <a href="index.html">The Gesamtschau</a>
      <span class="sep"> · </span>
      <a href="privacy.html"
         data-de="Datenschutz"
         data-en="Privacy"
         data-es="Privacidad"
         data-pt="Privacidade"
         data-fr="Confidentialité"
         data-ru="Конфиденциальность">Datenschutz</a>
    </footer>

  </div>

  <script>
    const LANGS = ['de', 'en', 'es', 'pt', 'fr', 'ru'];

    function setLang(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll(LANGS.map(l => '[data-' + l + ']').join(',')).forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text !== null) el.textContent = text;
      });
      LANGS.forEach(l => {
        document.getElementById('btn-' + l).classList.toggle('active', l === lang);
      });
      localStorage.setItem('gs-lang', lang);
    }

    const saved = localStorage.getItem('gs-lang') || 'de';
    setLang(saved);
  </script>
</body>
</html>
